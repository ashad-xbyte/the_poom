{% extends "base.html" %}
{% block content %}
{% load static %}

<div>

    <div class="d-flex p-2 bd-highlight">
  <div class="flex-shrink-0 p-3 bg-white" style="width: 280px;">
    <ul class="list-unstyled ps-0">
      <li class="mb-1">
        <button class="btn btn-toggle align-items-center rounded collapsed" data-bs-toggle="collapse" data-bs-target="#orders-collapse" aria-expanded="false">
          Actions
        </button>
        <div class="collapse" id="orders-collapse">
          <ul class="btn-toggle-nav list-unstyled fw-normal pb-1 small">
            <li><a href="#" class="link-dark rounded">Manage permissions</a></li>
            <li><a href="/upload" class="link-dark rounded">Upload files</a></li>
            <li><a href="#" class="link-dark rounded">View files</a></li>
<!--            <li><a href="#" class="link-dark rounded">Returned</a></li>-->
          </ul>
        </div>
      </li>
      <li class="border-top my-3"></li>
      <li class="mb-1">
        <button class="btn btn-toggle align-items-center rounded collapsed" data-bs-toggle="collapse" data-bs-target="#account-collapse" aria-expanded="false">
          My Account
        </button>
        <div class="collapse" id="account-collapse">
          <ul class="btn-toggle-nav list-unstyled fw-normal pb-1 small">
            <li><a href="#" class="link-dark rounded">Profile</a></li>
            <li><a href="#" class="link-dark rounded">Settings</a></li>
              <li><a href="{{user.roles.url}}" class="link-dark rounded">Dashboard</a></li>
            <li><a href="{% url 'logout_view' %}" class="link-dark rounded">Sign out</a></li>
          </ul>
        </div>
      </li>
    </ul>
  </div>

</div>
  </div>


<div class="col-md-4">
        <div class="container">
    <table class="table table-bordered">
            <thead>
                <tr>
                    <th scope="col">Sr. no</th>
                    <th scope="col">File name</th>
                    <th scope="col">Download</th>
                </tr>
            </thead>
            {% for i in fileall %}
            <tbody>
            <tr>
                <th scope="row">{{i.id}}</th>
                <td>{{i.file}}</td>
                <td><a href = "{{i.file.url}}" target="_blank">download</a></td>
            </tr>
            </tbody>
            {% endfor %}
    </table>
        </div>
</div>


{% endblock %}
