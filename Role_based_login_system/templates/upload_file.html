{% extends "base.html" %}
{% block content %}
{% load static %}

<div class="d-flex p-2 bd-highlight">
<div class="col-md-6">
            <div class="mail_section">
                {% if messages %}
                <div class="alert alert-warning alert-dismissible fade show" role="alert">
                {% for message in messages %}
                    {{ message }}
                {% endfor %}
                <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                  <span aria-hidden="true">&times;</span>
                </button>
                </div>
                {% endif %}
              <form  method="post" enctype="multipart/form-data">
                <div class="form-group">
                    {% csrf_token %}
                  <div class="form-group last mb-4">
                    <label for="title">Title</label>
                      {{ form.title }}
                  </div>
                  <div class="form-group last mb-4">
                    <label for="file">File</label>
                      {{ form.file}}
                  </div>
                    <div class="form-group last mb-4">
                    <label for="description">Description</label>
                      {{ form.description}}
                    </div>
<!--                    <label class="control control&#45;&#45;checkbox mb-0"><span class="caption">Admin</span>-->
<!--                        {{ form.is_admin_file }}-->
<!--                    </label>-->
                    <label class="control control--checkbox mb-0"><span class="caption">Sales</span>
                        {{ form.is_sales_file }}
                    </label>
                    <br><label class="control control--checkbox mb-0"><span class="caption">Production</span>
                        {{ form.is_production_file }}
                    </label>
                    <br><label class="control control--checkbox mb-0"><span class="caption">Devloper</span>
                        {{ form.is_devloper_file }}
                    </label>
                    <br><label class="control control--checkbox mb-0"><span class="caption">Client</span>
                        {{ form.is_client_file }}
                    </label>
                <br>
                    <br>
                    <div><button type="submit" class="btn btn-primary mb-2" onclick="sendEmail()">Upload</button></div>

                  </div>
              </form>
            </div>
        </div>
    </div>

{% endblock %}
